version: '3.8'

services:
  # PHP Application Service
  app:
    build:
      context: .
      dockerfile: docker/php.dockerfile
    container_name: sinav_app
    restart: unless-stopped
    working_dir: /var/www/sinav
    volumes:
      - .:/var/www/sinav
    networks:
      - sinav-network

  # Nginx Web Service
  web:
    image: nginx:alpine
    container_name: sinav_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/sinav
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - sinav-network

  # MySQL Database Service
  db:
    image: mysql:8.0
    container_name: sinav_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sinav
      MYSQL_ROOT_PASSWORD: root_password_1262
      MYSQL_USER: sinav_user
      MYSQL_PASSWORD: sinav_password_1262
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database_backup.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - sinav-network

  # Hermes Agent Service
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes_agent
    restart: unless-stopped
    command: ["gateway", "run"]
    tty: true
    stdin_open: true
    ports:
      - "8642:8642"
    volumes:
      - hermes_data:/home/node/.hermes
    networks:
      - sinav-network

networks:
  sinav-network:
    driver: bridge

volumes:
  db_data:
    driver: local
  hermes_data:
    driver: local
